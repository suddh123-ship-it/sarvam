<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowLight" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1120" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="46" font-size="26" font-weight="700" fill="#0f172a">AutoCare Voice Agent — System Architecture</text>
  <text x="40" y="72" font-size="14" fill="#64748b">Multilingual (Hindi / Hinglish) dealership service voice bot · Twilio telephony · Sarvam STT + LLM + TTS · FastAPI on Render</text>

  <!-- ===================== Customer ===================== -->
  <rect x="30" y="300" width="150" height="96" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="105" y="336" text-anchor="middle" font-size="30">📞</text>
  <text x="105" y="366" text-anchor="middle" font-size="15" font-weight="600" fill="#3730a3">Customer</text>
  <text x="105" y="384" text-anchor="middle" font-size="12" fill="#6366f1">speaks Hindi / Hinglish</text>

  <!-- ===================== Twilio ===================== -->
  <rect x="220" y="300" width="150" height="96" rx="12" fill="#fdecee" stroke="#F22F46" stroke-width="2"/>
  <text x="295" y="338" text-anchor="middle" font-size="16" font-weight="700" fill="#b3122b">Twilio</text>
  <text x="295" y="360" text-anchor="middle" font-size="12" fill="#e11d48">Telephony / PSTN</text>
  <text x="295" y="378" text-anchor="middle" font-size="11" fill="#94a3b8">TwiML · speech gather</text>

  <!-- ===================== FastAPI App container ===================== -->
  <rect x="420" y="110" width="360" height="500" rx="16" fill="#f8fafc" stroke="#0ea5e9" stroke-width="2"/>
  <text x="600" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#0369a1">FastAPI Application  ·  deployed on Render</text>

  <!-- Voice Webhooks -->
  <rect x="446" y="158" width="308" height="70" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="600" y="186" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Voice Webhooks</text>
  <text x="600" y="208" text-anchor="middle" font-size="11.5" fill="#64748b">/voice/inbound · /voice/gather · /voice/status</text>

  <!-- Conversation Manager -->
  <rect x="446" y="244" width="308" height="96" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="600" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Conversation Manager</text>
  <text x="600" y="293" text-anchor="middle" font-size="11.5" fill="#64748b">intent · entity extraction · session state</text>
  <text x="600" y="311" text-anchor="middle" font-size="11.5" fill="#64748b">escalation logic · call summarization</text>
  <text x="600" y="330" text-anchor="middle" font-size="11" fill="#94a3b8">(orchestrates the Sarvam calls)</text>

  <!-- CRM Store -->
  <rect x="446" y="356" width="150" height="86" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="521" y="392" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">CRM Store</text>
  <text x="521" y="412" text-anchor="middle" font-size="10.5" fill="#64748b">customers +</text>
  <text x="521" y="426" text-anchor="middle" font-size="10.5" fill="#64748b">call records</text>

  <!-- Dashboard -->
  <rect x="604" y="356" width="150" height="86" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="679" y="392" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">Dashboard</text>
  <text x="679" y="412" text-anchor="middle" font-size="10.5" fill="#64748b">/dashboard +</text>
  <text x="679" y="426" text-anchor="middle" font-size="10.5" fill="#64748b">/api/dashboard</text>

  <!-- ===================== Sarvam AI Cloud ===================== -->
  <rect x="838" y="200" width="252" height="300" rx="16" fill="#ecfdf5" stroke="#0d9488" stroke-width="2"/>
  <text x="964" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#0f766e">Sarvam AI APIs</text>

  <rect x="860" y="248" width="208" height="66" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="964" y="274" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">STT — Saaras v3</text>
  <text x="964" y="296" text-anchor="middle" font-size="11" fill="#64748b">speech → text (Hinglish)</text>

  <rect x="860" y="326" width="208" height="66" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="964" y="352" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">LLM — sarvam-105b</text>
  <text x="964" y="374" text-anchor="middle" font-size="11" fill="#64748b">reply + call summary</text>

  <rect x="860" y="404" width="208" height="66" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="964" y="430" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0f172a">TTS — Bulbul v2</text>
  <text x="964" y="452" text-anchor="middle" font-size="11" fill="#64748b">text → natural voice</text>

  <!-- ===================== Service Manager ===================== -->
  <rect x="590" y="644" width="178" height="60" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="679" y="672" text-anchor="middle" font-size="14" font-weight="600" fill="#9a3412">🧑‍💼 Service Manager</text>
  <text x="679" y="690" text-anchor="middle" font-size="11" fill="#c2410c">monitors calls live</text>

  <!-- ===================== Arrows / data flows ===================== -->
  <!-- Customer <-> Twilio -->
  <line x1="180" y1="340" x2="216" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="216" y1="358" x2="180" y2="358" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="198" y="326" text-anchor="middle" font-size="10.5" fill="#475569">voice call</text>

  <!-- Twilio -> Webhooks (1) -->
  <line x1="370" y1="330" x2="442" y2="250" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="406" cy="284" r="11" fill="#0ea5e9"/>
  <text x="406" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <text x="360" y="238" font-size="10.5" fill="#475569">HTTPS webhook (POST)</text>

  <!-- Webhooks -> Conversation Manager -->
  <line x1="600" y1="228" x2="600" y2="242" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Conversation Manager -> Sarvam (2) -->
  <line x1="754" y1="286" x2="856" y2="286" stroke="#0d9488" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="805" cy="286" r="11" fill="#0d9488"/>
  <text x="805" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <text x="805" y="268" text-anchor="middle" font-size="10.5" fill="#0f766e">STT · LLM · TTS</text>

  <!-- Sarvam -> Conversation Manager (return, 3) -->
  <line x1="856" y1="360" x2="754" y2="318" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowLight)"/>
  <circle cx="805" cy="339" r="11" fill="#94a3b8"/>
  <text x="805" y="343" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <text x="812" y="358" font-size="10.5" fill="#64748b">text / audio back</text>

  <!-- Conversation Manager -> CRM (4) -->
  <line x1="540" y1="340" x2="521" y2="352" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="505" cy="345" r="11" fill="#0ea5e9"/>
  <text x="505" y="349" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>
  <text x="452" y="352" font-size="10" fill="#475569">summary + status</text>

  <!-- CRM -> Dashboard -->
  <line x1="596" y1="399" x2="602" y2="399" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dashboard -> Manager (5) -->
  <line x1="679" y1="442" x2="679" y2="642" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="679" cy="545" r="11" fill="#ea580c"/>
  <text x="679" y="549" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">5</text>
  <text x="689" y="545" font-size="10.5" fill="#c2410c">live (polls every 4s)</text>

  <!-- Return path note: TTS audio -> Twilio -> Customer -->
  <path d="M446 200 C 300 200, 300 250, 295 296" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowLight)"/>
  <text x="300" y="180" font-size="10.5" fill="#64748b">6 · reply audio played to caller</text>

  <!-- Legend -->
  <rect x="40" y="470" width="300" height="150" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="58" y="496" font-size="13" font-weight="700" fill="#0f172a">Per-call flow</text>
  <text x="58" y="520" font-size="11.5" fill="#334155">1 · Twilio delivers the call to the app</text>
  <text x="58" y="540" font-size="11.5" fill="#334155">2 · Speech → Sarvam STT; text → LLM reply</text>
  <text x="58" y="560" font-size="11.5" fill="#334155">3 · LLM text → Sarvam TTS voice</text>
  <text x="58" y="580" font-size="11.5" fill="#334155">4 · On end: LLM summary → CRM status</text>
  <text x="58" y="600" font-size="11.5" fill="#334155">5–6 · Dashboard updates; reply spoken back</text>
</svg>
